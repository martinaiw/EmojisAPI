<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emojis API Search</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1>Emoji Search Engine</h1>
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Search for an emoji (e.g. smile, heart, fire)...">
        </div>
    </header>

    <main>
        <div id="emoji-container" class="emoji-grid">
        </div>
    </main>
    <div id="toast-container" class="toast hidden">
        Emoji copied to clipboard! <span id="copied-emoji"></span>
    </div>
    <script src="https://akhil-06.github.io/emoji_project/emojiList.js"></script>
    <script src="script.js"></script>
</body>

</html>
